<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>填写需求 / FRAME</title>
  <style>
    :root{--ink:#f5f5ee;--paper:#090909;--line:#303030;--muted:#aaa9a0;--signal:#eaff31}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0}.shell{width:min(900px,calc(100% - 40px));margin:auto}.top{min-height:76px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{font-size:22px;font-weight:900}.brand span{font-weight:900;color:var(--signal)}.back{color:var(--signal);font-size:14px;font-weight:800;text-decoration:none}.back:hover{text-decoration:underline}.page{padding:82px 0}.eyebrow{margin:0 0 17px;font-size:12px;font-weight:900;color:var(--signal)}h1{margin:0;font-size:clamp(38px,7vw,66px);line-height:1.02;font-weight:900}.intro{max-width:600px;margin:20px 0 38px;color:#c0c0ba;line-height:1.7}.selected{padding:22px;border:1px solid var(--signal);border-left:6px solid var(--signal);border-radius:0;background:#151515;margin-bottom:18px}.selected span{display:block;font-size:12px;color:var(--signal);font-weight:800;margin-bottom:9px}.selected strong{font-size:23px;font-weight:900}.selected p{margin:10px 0 0;font-size:14px;color:#c0c0ba;line-height:1.55}.form{display:grid;gap:18px}.form-group{display:grid;gap:8px}.form-group label,.group-title{font-size:13px;font-weight:800}.form-group input,.form-group textarea,.form-group select{width:100%;padding:13px;border:1px solid #4b4b4b;border-radius:0;background:#121212;color:var(--ink);font:inherit;outline:none}.form-group textarea{min-height:125px;resize:vertical}.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--signal);background:#181818}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.choice{position:relative}.choice input{position:absolute;opacity:0}.choice span{min-height:56px;padding:9px;display:grid;place-items:center;text-align:center;border:1px solid #454545;border-radius:0;background:#151515;font-size:14px;font-weight:700;cursor:pointer}.choice input:checked+span{border-color:var(--signal);background:var(--signal);color:#090909}.submit{margin-top:10px;padding:15px 18px;border:1px solid var(--signal);border-radius:0;background:var(--signal);color:#090909;font:inherit;font-weight:900;cursor:pointer}.submit:hover{background:#f5f5ee;border-color:#f5f5ee}.success{display:none;margin-top:20px;padding:16px;border:1px solid var(--signal);background:#151515;line-height:1.55}.success.show{display:block}@media(max-width:600px){.shell{width:min(100% - 28px,900px)}.top{min-height:64px}.page{padding:52px 0}.two,.choice-grid{grid-template-columns:1fr}.choice-grid{gap:7px}.choice span{min-height:48px}}
    /* Quiet editorial request page */
    :root{--ink:#f1eee7;--paper:#121211;--line:#45423d;--muted:#aaa69e;--signal:#db4f31}
    body{background:#121211}.shell{width:min(900px,calc(100% - 56px))}.top{border-color:var(--line)}.brand{font-family:Georgia,"Songti SC",serif;font-size:25px;font-weight:700}.brand span{color:var(--ink);font-family:Arial,"PingFang SC",sans-serif;font-size:11px}.back{color:var(--ink);font-family:Georgia,"Songti SC",serif;font-weight:400}.page{padding:104px 0}.eyebrow{color:var(--signal);font-size:11px}.page h1{font-family:Georgia,"Songti SC",serif;font-weight:500}.intro{font-family:Georgia,"Songti SC",serif;color:#d4cec4;font-size:17px;line-height:1.8}.selected{border-color:var(--line);border-left:5px solid var(--signal);background:#1a1917}.selected span{color:var(--signal)}.selected strong{font-family:Georgia,"Songti SC",serif;font-weight:500}.selected p{font-family:Georgia,"Songti SC",serif;color:#c9c4ba}.form-group label,.group-title{font-weight:600}.form-group input,.form-group textarea{border-color:#565149;border-radius:0;background:#1a1917}.form-group input:focus,.form-group textarea:focus{border-color:var(--signal);background:#22201d}.choice span{border-color:#565149;border-radius:0;background:#1a1917;font-family:Georgia,"Songti SC",serif;font-weight:400}.choice input:checked+span{border-color:var(--signal);background:var(--signal);color:#fff8ed}.submit{border-color:var(--signal);border-radius:0;background:var(--signal);color:#fff8ed;font-family:Georgia,"Songti SC",serif;font-weight:600}.submit:hover{background:#f1eee7;border-color:#f1eee7;color:#121211}.success{border-color:var(--signal);background:#1a1917;font-family:Georgia,"Songti SC",serif}
    :root{--ink:#1b1a18;--paper:#f7f6f2;--line:#dedbd3;--muted:#77736c;--signal:#b6442d}body{background:#f7f6f2}.top{border-color:var(--line)}.brand span,.back{color:var(--ink)}.intro{color:#56514a}.selected{border-color:#dedbd3;border-left-color:var(--signal);background:#fff;box-shadow:0 12px 28px rgba(34,31,26,.08)}.selected p{color:#5d5851}.form-group input,.form-group textarea{border-color:#ccc7be;background:#fff;color:var(--ink)}.form-group input:focus,.form-group textarea:focus{background:#fff;border-color:var(--signal);box-shadow:0 6px 15px rgba(148,54,35,.1)}.choice span{border-color:#d9d5cd;background:#fff;box-shadow:0 5px 12px rgba(34,31,26,.07);transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s,background .25s}.choice span:hover{transform:translateY(-3px);box-shadow:0 12px 20px rgba(34,31,26,.13)}.choice input:checked+span{background:var(--signal);color:#fff}.submit{box-shadow:0 8px 16px rgba(148,54,35,.23);transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s,background .25s}.submit:hover{background:var(--signal);border-color:var(--signal);color:#fff;transform:translateY(-4px);box-shadow:0 16px 24px rgba(148,54,35,.29)}.success{background:#fff;box-shadow:0 10px 22px rgba(34,31,26,.08)}@media(max-width:600px){.shell{width:min(100% - 30px,900px)}.page{padding:70px 0}}
    .controls{display:flex;gap:10px;justify-content:flex-end;align-items:center}.confirm-modal{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:18px;background:rgba(26,24,21,.38);backdrop-filter:blur(8px)}.confirm-modal[hidden]{display:none}.confirm-box{width:min(480px,100%);padding:30px;background:#f7f6f2;border:1px solid #dedbd3;box-shadow:0 24px 60px rgba(34,31,26,.22)}.confirm-box h2{margin:0;font-family:Georgia,"Songti SC",serif;font-weight:500}.confirm-box p{color:#56514a;line-height:1.7}.confirm-box img{display:block;width:min(280px,100%);margin:20px auto;border:1px solid #dedbd3;background:#fff}.confirm-box .submit{margin-top:8px}.confirm-box .controls .submit:first-child{background:#fff;color:#1b1a18;border-color:#d6d1c8;box-shadow:none}
    /* Stable type and form layout across desktop and mobile browsers */
    body { overflow-x:hidden; } h1,h2,strong,p,label,button { overflow-wrap:anywhere; }.page h1 { font-size:62px; }.form-group,.two,.choice-grid { min-width:0; }.form-group input,.form-group textarea { min-width:0; }.controls { flex-wrap:wrap; }.controls .submit { flex:1 1 140px; }.confirm-box { max-height:calc(100vh - 36px); overflow:auto; }
    @media(max-width:760px){.shell{width:calc(100% - 32px)}.top{min-height:64px}.brand{font-size:20px}.page{padding:72px 0}.page h1{font-size:46px;line-height:1.12}.intro{font-size:16px}.selected{padding:18px}.selected strong{font-size:20px}.two{grid-template-columns:1fr}.choice-grid{grid-template-columns:1fr}.choice span{min-height:48px}.confirm-box{padding:24px}.confirm-box h2{font-size:29px}}
    @media(max-width:430px){.shell{width:calc(100% - 24px)}.page{padding:54px 0}.page h1{font-size:38px}.top{gap:12px}.back{font-size:12px}.form-group input,.form-group textarea{padding:12px}.submit{padding:13px 14px}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><div class="brand">FRAME <span>/ STUDIO</span></div><a class="back" id="backLink" href="index.html">← 返回服务页</a></header>
    <section class="page"><p class="eyebrow" id="eyebrow">COMMISSION REQUEST</p><h1 id="heading">填写你的需求</h1><p class="intro">把已知信息尽量写清楚。收到后会依据项目内容、地点和时间与你确认档期与最终报价。</p>
      <div class="selected"><span>你正在咨询</span><strong id="jobTitle">服务项目</strong><p id="jobPrice"></p></div>
      <div class="selected" id="accountGate"><span>账户</span><strong id="accountState">登录后可保留历史订单</strong><p id="accountHint">创建账户或登录后，再提交需求。</p><div class="two" id="accountInputs"><div class="form-group"><label for="accountName">账户名</label><input id="accountName" placeholder="账户名"></div><div class="form-group"><label for="accountPassword">密码</label><input id="accountPassword" type="password" placeholder="密码"></div></div><div class="controls"><button class="submit" type="button" id="registerAccount">创建账户</button><button class="submit" type="button" id="loginAccount">登录</button></div><div id="history"></div></div>
      <form class="form" id="requestForm">
        <div class="two"><div class="form-group"><label for="name">称呼</label><input id="name" required placeholder="怎么称呼你"></div><div class="form-group"><label for="contact">联系方式</label><input id="contact" required placeholder="微信或手机号码"></div></div>
        <div class="two"><div class="form-group"><label for="date">期望日期</label><input id="date" type="date" required></div><div class="form-group"><label for="time">期望时间</label><input id="time" placeholder="例如：14:00 - 18:00"></div></div>
        <div id="photoOptions"><p class="group-title">摄影项目</p><div class="choice-grid"><label class="choice"><input type="radio" name="photoType" value="二次元 COS 单子" checked><span>二次元 COS 单子</span></label><label class="choice"><input type="radio" name="photoType" value="陪拍单子"><span>陪拍单子</span></label><label class="choice"><input type="radio" name="photoType" value="人像单子"><span>人像单子</span></label></div></div>
        <div class="form-group"><label for="address">拍摄/见面地址</label><input id="address" required placeholder="填写城市、具体场地或集合地点"></div>
        <div class="two"><div class="form-group" id="customPriceGroup"><label for="customPrice">自定义参考价格</label><input id="customPrice" inputmode="decimal" placeholder="例如：¥ 1,500"></div><div class="form-group"><label for="duration">预计时长</label><input id="duration" placeholder="例如：半天、3 小时"></div></div>
        <div class="form-group"><label for="detail">具体需求</label><textarea id="detail" required placeholder="例如：拍摄/剪辑风格、人数、需要交付的内容、参考作品、特殊安排等。"></textarea></div>
        <button class="submit" type="submit">提交需求</button>
      </form>
      <div class="success" id="success">需求已整理完成。请将本页内容截图或复制给摄影师，以便确认档期与最终报价。</div>
    </section>
  </main>
  <div class="confirm-modal" id="confirmModal" hidden><div class="confirm-box"><p class="eyebrow">CONFIRM REQUEST</p><h2>确认提交需求？</h2><p>确认后会保存本次参考价格，并显示编辑版设置的收款二维码。</p><div class="controls"><button class="submit" type="button" id="cancelConfirm">返回修改</button><button class="submit" type="button" id="confirmRequest">确认需求</button></div></div></div>
  <div class="confirm-modal" id="paymentModal" hidden><div class="confirm-box"><p class="eyebrow">PAYMENT</p><h2>订单已记录</h2><p id="paymentText">请使用下方二维码完成付款。付款状态需由编辑用户在后台核验。</p><img id="qrImage" alt="收款二维码" hidden><p id="qrEmpty" class="hint">编辑版尚未上传收款二维码。</p><button class="submit" type="button" id="closePayment">完成</button></div></div>
  <script>
    const defaults={video:[{title:'品牌短片 / 叙事影像',price:'¥ 2,800 起'},{title:'活动现场记录',price:'¥ 1,800 起'}],photo:[{title:'人物肖像拍摄',price:'¥ 800 起'},{title:'品牌 / 产品拍摄',price:'¥ 1,200 起'}]};
    const data=JSON.parse(localStorage.getItem('frame-studio-data-v1')||'null')||defaults;
    const accountsKey='frame-studio-accounts-v1',sessionKey='frame-studio-session-v1',qrKey='frame-studio-payment-qr-v1';
    const defaultAccounts=[{name:'studio-admin',password:'123456',role:'editor',purchases:[]},{name:'studio-editor',password:'123456',role:'editor',purchases:[]}];
    let accounts=JSON.parse(localStorage.getItem(accountsKey)||'null')||defaultAccounts;
    let activeAccount=JSON.parse(localStorage.getItem(sessionKey)||'null');
    const saveAccounts=()=>localStorage.setItem(accountsKey,JSON.stringify(accounts));
    const q=new URLSearchParams(location.search),type=q.get('type')==='photo'?'photo':'video',index=Number(q.get('job'))||0,editorMode=q.get('edit')==='1',job=data[type]?.[index]||data[type]?.[0]||{title:'服务项目',price:'价格待定'};
    const isPhoto=type==='photo';
    document.getElementById('eyebrow').textContent=isPhoto?'PHOTO COMMISSION REQUEST':'EDITING COMMISSION REQUEST';
    document.getElementById('heading').textContent=isPhoto?'填写摄影需求':'填写剪辑需求';
    document.getElementById('jobTitle').textContent=job.title;document.getElementById('jobPrice').textContent='参考价格：'+job.price;
    function renderAccount(){const account=accounts.find(a=>a.name===activeAccount?.name);document.getElementById('accountState').textContent=account?`已登录：${account.name}`:'登录后可保留历史订单';document.getElementById('accountHint').textContent=account?'你的订单会保存到此账户。':'创建账户或登录后，再提交需求。';document.getElementById('accountInputs').hidden=!!account;document.getElementById('registerAccount').hidden=!!account;document.getElementById('loginAccount').hidden=!!account;document.getElementById('history').innerHTML=account?.purchases?.length?`<p class="hint">历史订单：${account.purchases.map(p=>`${p.title}（${p.price}）`).join('、')}</p>`:'';}
    if(editorMode){document.getElementById('customPrice').value=job.price;document.getElementById('eyebrow').textContent+=' / EDIT MODE';document.getElementById('backLink').href='index.html?edit=1';document.getElementById('accountGate').remove();}else{document.getElementById('customPriceGroup').remove();document.getElementById('duration').closest('.two').style.gridTemplateColumns='1fr';renderAccount();}
    if(!isPhoto){document.getElementById('photoOptions').remove();document.querySelector('label[for="address"]').textContent='素材/沟通地址';document.getElementById('address').placeholder='填写素材传输方式、网盘链接或方便沟通的地点';}
    if(!editorMode){document.getElementById('registerAccount').onclick=()=>{const name=document.getElementById('accountName').value.trim(),password=document.getElementById('accountPassword').value;if(!name||!password)return alert('请填写账户名和密码。');if(accounts.some(a=>a.name===name))return alert('该账户名已存在。');accounts.push({name,password,role:'customer',purchases:[]});saveAccounts();activeAccount={name,role:'customer'};localStorage.setItem(sessionKey,JSON.stringify(activeAccount));renderAccount();};
    document.getElementById('loginAccount').onclick=()=>{const name=document.getElementById('accountName').value.trim(),password=document.getElementById('accountPassword').value,account=accounts.find(a=>a.name===name&&a.password===password);if(!account)return alert('账户名或密码不正确。');activeAccount={name:account.name,role:account.role};localStorage.setItem(sessionKey,JSON.stringify(activeAccount));renderAccount();};}
    document.getElementById('requestForm').addEventListener('submit',e=>{e.preventDefault();if(editorMode){const price=document.getElementById('customPrice').value.trim();if(price){data[type][index].price=price;localStorage.setItem('frame-studio-data-v1',JSON.stringify(data));document.getElementById('jobPrice').textContent='参考价格：'+price;}document.getElementById('success').textContent='参考价格已保存。刷新展示版后，顾客将只会看到这里的参考价格。';document.getElementById('success').classList.add('show');return;}if(!activeAccount)return alert('请先创建账户或登录。');document.getElementById('confirmModal').hidden=false;});
    document.getElementById('cancelConfirm').onclick=()=>document.getElementById('confirmModal').hidden=true;
    document.getElementById('confirmRequest').onclick=()=>{const account=accounts.find(a=>a.name===activeAccount.name);account.purchases.push({title:job.title,price:job.price,status:'待付款',createdAt:new Date().toLocaleDateString('zh-CN')});saveAccounts();document.getElementById('confirmModal').hidden=true;const qr=localStorage.getItem(qrKey);document.getElementById('qrImage').hidden=!qr;document.getElementById('qrEmpty').hidden=!!qr;if(qr)document.getElementById('qrImage').src=qr;document.getElementById('paymentModal').hidden=false;renderAccount();};
    document.getElementById('closePayment').onclick=()=>document.getElementById('paymentModal').hidden=true;
  </script>
</body>
</html>
